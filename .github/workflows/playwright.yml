name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  unit:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./client

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: client/package-lock.json

    - name: Use npmjs registry
      run: npm config set registry https://registry.npmjs.org

    - name: Install dependencies
      run: npm ci

    - name: Typecheck
      run: npm run typecheck

    - name: Install coverage provider
      run: npm i -D @vitest/coverage-v8@3.2.4

    - name: Unit tests + Coverage
      run: npm run test:coverage

    - name: Lint
      run: npm run lint

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: vitest-coverage
        path: client/coverage/
        retention-days: 30

  playwright:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    defaults:
      run:
        working-directory: ./client

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: client/package-lock.json

    - name: Use npmjs registry
      run: npm config set registry https://registry.npmjs.org

    - name: Install client dependencies
      run: npm ci

    - name: Install server dependencies
      run: npm ci
      working-directory: ./server

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Run Playwright tests (chromium full, others smoke)
      env:
        CI: true
      run: |
        if [ "${{ matrix.browser }}" = "chromium" ]; then
          npx playwright test --project=${{ matrix.browser }}
        else
          npx playwright test tests/meeting.spec.js --project=${{ matrix.browser }}
        fi

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ matrix.browser }}
        path: client/playwright-report/
        retention-days: 30
